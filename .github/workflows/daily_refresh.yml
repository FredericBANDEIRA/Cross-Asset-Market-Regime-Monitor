name: Daily Data Refresh

on:
    schedule:
        # Run at 06:00 UTC daily (after US market close + processing time)
        - cron: "0 6 * * *"
    workflow_dispatch: # Allow manual trigger

permissions:
    contents: write

jobs:
    refresh-data:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install pandas yfinance pandas-datareader matplotlib python-dateutil requests setuptools

            - name: Run data collection pipeline
              run: python data_collection.py

            - name: Commit updated data files
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add data/*.csv
                  git diff --cached --quiet || git commit -m "chore: daily data refresh $(date -u +'%Y-%m-%d')"
                  git push
